<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Closer Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .register-container {
            width: 100%;
            max-width: 420px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #d4af37 0%, #f4e4c1 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            font-weight: 800;
            color: #1a1f3a;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.3);
        }

        .logo-text {
            font-size: 28px;
            font-weight: 900;
            color: #d4af37;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .logo-sub {
            font-size: 12px;
            color: #8fa3c2;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 20px auto;
        }

        .register-box {
            background: rgba(26, 31, 58, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: #d4af37;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            font-size: 14px;
            color: #e8e8f0;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: #7a8ba8;
        }

        .form-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4af37 0%, #f4e4c1 100%);
            color: #1a1f3a;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4);
        }

        .alert {
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            border-left: 4px solid;
        }

        .alert.error {
            background: rgba(220, 53, 69, 0.1);
            color: #ff7f7f;
            border-left-color: #dc3545;
        }

        .alert.success {
            background: rgba(40, 167, 69, 0.1);
            color: #7fff7f;
            border-left-color: #28a745;
        }

        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #8fa3c2;
        }

        .footer-link a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 700;
        }

        @media (max-width: 480px) {
            .register-box {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo-section">
            <div class="logo-box">C</div>
            <div class="logo-text">Closer Pro</div>
            <div class="logo-sub">Professional Intelligence System</div>
            <div class="divider"></div>
        </div>

        <div class="register-box">
            <div id="alert" class="alert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" id="username" class="form-input" required placeholder="输入用户名" minlength="3">
                </div>

                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" id="email" class="form-input" required placeholder="输入邮箱地址">
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="password" class="form-input" required placeholder="创建密码" minlength="6">
                </div>

                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <input type="password" id="confirmPassword" class="form-input" required placeholder="确认密码">
                </div>

                <button type="submit" class="btn-register">创建账户</button>
            </form>

            <div class="footer-link">
                已有账户？<a href="/login">立即登录</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const alert = document.getElementById('alert');

            if (password !== confirmPassword) {
                alert.className = 'alert error';
                alert.textContent = '两次输入的密码不一致';
                alert.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, confirmPassword })
                });
                const data = await res.json();
                if (data.success) {
                    alert.className = 'alert success';
                    alert.textContent = '注册成功，正在跳转到登录...';
                    alert.style.display = 'block';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    alert.className = 'alert error';
                    alert.textContent = data.message;
                    alert.style.display = 'block';
                }
            } catch (e) {
                alert.className = 'alert error';
                alert.textContent = '注册失败';
                alert.style.display = 'block';
            }
        });
    </script>
</body>
</html>
