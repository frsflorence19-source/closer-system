<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Closer Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', 'Inter', -apple-system, sans-serif;
            background: #0a0a0a;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .badge {
            width: 140px;
            height: 140px;
            margin: 0 auto 40px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: 900;
            color: #d4af37;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
        }

        .badge::before {
            content: '⚜';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            opacity: 0.8;
        }

        .badge::after {
            content: '⚜';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            opacity: 0.8;
        }

        .title {
            font-size: 36px;
            font-weight: 900;
            color: #d4af37;
            letter-spacing: 3px;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.2);
        }

        .subtitle {
            font-size: 12px;
            color: #8fa3c2;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, #d4af37 50%, transparent 100%);
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 28px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 11px;
            color: #d4af37;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 6px;
            color: #e8e8e8;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: #6a7a96;
        }

        .form-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.06);
            border-color: #d4af37;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #c9a854 0%, #d4af37 50%, #c9a854 100%);
            color: #0a0a0a;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .btn:hover {
            background: linear-gradient(135deg, #d4af37 0%, #e8c547 50%, #d4af37 100%);
            transform: translateY(-1px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .alert {
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 24px;
            font-size: 13px;
            display: none;
            border-left: 3px solid;
        }

        .alert.error {
            background: rgba(220, 53, 69, 0.08);
            color: #ff8a8a;
            border-left-color: #dc3545;
        }

        .alert.success {
            background: rgba(40, 167, 69, 0.08);
            color: #7fff7f;
            border-left-color: #28a745;
        }

        .footer {
            margin-top: 32px;
            font-size: 13px;
            color: #8fa3c2;
        }

        .footer a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 700;
        }

        @media (max-width: 480px) {
            .title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">⚔</div>
        
        <h1 class="title">Closer Pro</h1>
        <p class="subtitle">Create Account</p>
        
        <div class="divider"></div>

        <div id="alert" class="alert"></div>

        <form id="registerForm">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" id="username" class="form-input" required placeholder="输入用户名" minlength="3">
            </div>

            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input type="email" id="email" class="form-input" required placeholder="输入邮箱地址">
            </div>

            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" id="password" class="form-input" required placeholder="创建密码" minlength="6">
            </div>

            <div class="form-group">
                <label class="form-label">确认密码</label>
                <input type="password" id="confirmPassword" class="form-input" required placeholder="确认密码">
            </div>

            <button type="submit" class="btn">创建账户</button>
        </form>

        <div class="footer">
            已有账户？<a href="/login">立即登录</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const alert = document.getElementById('alert');

            if (password !== confirmPassword) {
                alert.className = 'alert error';
                alert.textContent = '两次输入的密码不一致';
                alert.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, confirmPassword })
                });
                const data = await res.json();
                if (data.success) {
                    alert.className = 'alert success';
                    alert.textContent = '注册成功，正在跳转...';
                    alert.style.display = 'block';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    alert.className = 'alert error';
                    alert.textContent = data.message;
                    alert.style.display = 'block';
                }
            } catch (e) {
                alert.className = 'alert error';
                alert.textContent = '注册失败';
                alert.style.display = 'block';
            }
        });
    </script>
</body>
</html>
