<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin 管理 - Closer Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0a;
            color: #e8e8e8;
            min-height: 100vh;
        }

        .header {
            background: #0f0f1e;
            border-bottom: 1px solid #3a3a4e;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 24px;
            font-weight: 900;
            color: #d4af37;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            text-align: right;
        }

        .username {
            font-weight: 700;
            color: #e8e8e8;
        }

        .role-badge {
            font-size: 11px;
            color: #d4af37;
            font-weight: 700;
        }

        .logout-btn {
            padding: 8px 20px;
            background: #d4af37;
            color: #0a0a0a;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
        }

        .logout-btn:hover {
            background: #e8c547;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 900;
            color: #d4af37;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #3a3a4e;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a2e;
            border-radius: 8px;
            overflow: hidden;
        }

        .users-table thead {
            background: #0f0f1e;
            border-bottom: 1px solid #3a3a4e;
        }

        .users-table th {
            padding: 16px;
            text-align: left;
            font-weight: 700;
            color: #d4af37;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .users-table td {
            padding: 16px;
            border-bottom: 1px solid #3a3a4e;
            color: #e8e8e8;
            font-size: 14px;
        }

        .users-table tr:hover {
            background: #252540;
        }

        .user-email {
            color: #8fa3c2;
            font-size: 13px;
        }

        .role-select {
            padding: 6px 8px;
            background: #2a2a3e;
            border: 1px solid #3a3a4e;
            border-radius: 4px;
            color: #e8e8e8;
            cursor: pointer;
            font-size: 12px;
        }

        .role-select:focus {
            outline: none;
            border-color: #d4af37;
        }

        .status-select {
            padding: 6px 8px;
            background: #2a2a3e;
            border: 1px solid #3a3a4e;
            border-radius: 4px;
            color: #e8e8e8;
            cursor: pointer;
            font-size: 12px;
        }

        .status-select:focus {
            outline: none;
            border-color: #d4af37;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
        }

        .status-active {
            background: rgba(40, 167, 69, 0.2);
            color: #7fff7f;
        }

        .status-disabled {
            background: rgba(220, 53, 69, 0.2);
            color: #ff8a8a;
        }

        .alert {
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: rgba(40, 167, 69, 0.1);
            color: #7fff7f;
            border: 1px solid rgba(40, 167, 69, 0.3);
        }

        .alert.error {
            background: rgba(220, 53, 69, 0.1);
            color: #ff8a8a;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #1a1a2e;
            border: 1px solid #3a3a4e;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 900;
            color: #d4af37;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: #8fa3c2;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr;
            }
            .users-table {
                font-size: 12px;
            }
            .users-table th,
            .users-table td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">⚙️ Admin 管理</div>
        <div class="header-right">
            <div class="user-info">
                <div class="username" id="adminName">Admin</div>
                <div class="role-badge">管理员</div>
            </div>
            <button class="logout-btn" onclick="logout()">登出</button>
        </div>
    </div>

    <div class="container">
        <div id="alert" class="alert"></div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">总用户数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="activeUsers">0</div>
                <div class="stat-label">活跃用户</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="adminUsers">0</div>
                <div class="stat-label">Admin 数</div>
            </div>
        </div>

        <h2 class="section-title">用户管理</h2>
        <table class="users-table">
            <thead>
                <tr>
                    <th>用户名</th>
                    <th>邮箱</th>
                    <th>角色</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody id="usersList">
                <tr>
                    <td colspan="4" style="text-align: center; color: #8fa3c2;">加载中...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        async function loadUsers() {
            try {
                const res = await fetch('/api/users');
                const data = await res.json();
                if (data.success) {
                    renderUsers(data.users);
                    updateStats(data.users);
                }
            } catch (e) {
                showAlert('加载用户失败', 'error');
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersList');
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.username}</td>
                    <td><div class="user-email">${user.email}</div></td>
                    <td>
                        <select class="role-select" onchange="updateUserRole(${user.id}, this.value)">
                            <option value="user" ${user.role === 'user' ? 'selected' : ''}>User</option>
                            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                        </select>
                    </td>
                    <td>
                        <select class="status-select" onchange="updateUserStatus(${user.id}, this.value)">
                            <option value="active" ${user.status === 'active' ? 'selected' : ''}>启用</option>
                            <option value="disabled" ${user.status === 'disabled' ? 'selected' : ''}>禁用</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats(users) {
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('activeUsers').textContent = users.filter(u => u.status === 'active').length;
            document.getElementById('adminUsers').textContent = users.filter(u => u.role === 'admin').length;
        }

        async function updateUserRole(userId, role) {
            try {
                const res = await fetch(`/api/users/${userId}/role`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role })
                });
                const data = await res.json();
                if (data.success) {
                    showAlert('角色已更新', 'success');
                    loadUsers();
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (e) {
                showAlert('更新失败', 'error');
            }
        }

        async function updateUserStatus(userId, status) {
            try {
                const res = await fetch(`/api/users/${userId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                const data = await res.json();
                if (data.success) {
                    showAlert('状态已更新', 'success');
                    loadUsers();
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (e) {
                showAlert('更新失败', 'error');
            }
        }

        function showAlert(msg, type) {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.className = `alert ${type}`;
            alert.style.display = 'block';
            setTimeout(() => { alert.style.display = 'none'; }, 3000);
        }

        function logout() {
            fetch('/api/logout').then(() => {
                window.location.href = '/login';
            });
        }

        // 初始化
        loadUsers();
    </script>
</body>
</html>
