<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin 管理 - Closer Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0a;
            color: #e8e8e8;
            min-height: 100vh;
        }

        .header {
            background: #0f0f1e;
            border-bottom: 1px solid #3a3a4e;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 24px;
            font-weight: 900;
            color: #d4af37;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logout-btn {
            padding: 8px 20px;
            background: #d4af37;
            color: #0a0a0a;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
        }

        .logout-btn:hover {
            background: #e8c547;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 900;
            color: #d4af37;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #3a3a4e;
        }

        .create-section {
            background: #1a1a2e;
            border: 1px solid #3a3a4e;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 40px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 12px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 11px;
            color: #d4af37;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .form-input, .form-select {
            padding: 10px 12px;
            background: #2a2a3e;
            border: 1px solid #3a3a4e;
            border-radius: 6px;
            color: #e8e8e8;
            font-size: 13px;
            font-family: inherit;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #d4af37;
        }

        .create-btn {
            padding: 10px 20px;
            background: #d4af37;
            color: #0a0a0a;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .create-btn:hover {
            background: #e8c547;
            transform: translateY(-1px);
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a2e;
            border-radius: 8px;
            overflow: hidden;
        }

        .users-table thead {
            background: #0f0f1e;
            border-bottom: 1px solid #3a3a4e;
        }

        .users-table th {
            padding: 16px;
            text-align: left;
            font-weight: 700;
            color: #d4af37;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .users-table td {
            padding: 16px;
            border-bottom: 1px solid #3a3a4e;
            color: #e8e8e8;
            font-size: 14px;
        }

        .users-table tr:hover {
            background: #252540;
        }

        .user-email {
            color: #8fa3c2;
            font-size: 13px;
        }

        .role-select, .status-select {
            padding: 6px 8px;
            background: #2a2a3e;
            border: 1px solid #3a3a4e;
            border-radius: 4px;
            color: #e8e8e8;
            cursor: pointer;
            font-size: 12px;
        }

        .reset-btn {
            padding: 6px 12px;
            background: #d4af37;
            color: #0a0a0a;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
        }

        .reset-btn:hover {
            background: #e8c547;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #1a1a2e;
            border: 1px solid #3a3a4e;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 900;
            color: #d4af37;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: #8fa3c2;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .alert {
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: rgba(40, 167, 69, 0.1);
            color: #7fff7f;
            border: 1px solid rgba(40, 167, 69, 0.3);
        }

        .alert.error {
            background: rgba(220, 53, 69, 0.1);
            color: #ff8a8a;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border: 1px solid #3a3a4e;
            border-radius: 8px;
            padding: 30px;
            max-width: 400px;
            text-align: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 900;
            color: #d4af37;
            margin-bottom: 20px;
        }

        .password-box {
            background: #0f0f1e;
            border: 1px solid #3a3a4e;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: 700;
            color: #d4af37;
            word-break: break-all;
        }

        .modal-btn {
            padding: 10px 20px;
            background: #d4af37;
            color: #0a0a0a;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
        }

        .copy-btn {
            padding: 8px 16px;
            background: #3a3a4e;
            color: #d4af37;
            border: 1px solid #d4af37;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            margin-left: 10px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">⚙️ Admin 管理</div>
        <button class="logout-btn" onclick="logout()">登出</button>
    </div>

    <div class="container">
        <div id="alert" class="alert"></div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">总用户数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="activeUsers">0</div>
                <div class="stat-label">活跃用户</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="adminUsers">0</div>
                <div class="stat-label">Admin 数</div>
            </div>
        </div>

        <h2 class="section-title">➕ 创建新用户</h2>
        <div class="create-section">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" id="newUsername" class="form-input" placeholder="输入用户名" minlength="3">
                </div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" id="newEmail" class="form-input" placeholder="输入邮箱">
                </div>
                <div class="form-group">
                    <label class="form-label">角色</label>
                    <select id="newRole" class="form-select">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button class="create-btn" onclick="createUser()">创建用户</button>
            </div>
        </div>

        <h2 class="section-title">👥 用户管理</h2>
        <table class="users-table">
            <thead>
                <tr>
                    <th>用户名</th>
                    <th>邮箱</th>
                    <th>角色</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="usersList">
                <tr>
                    <td colspan="5" style="text-align: center; color: #8fa3c2;">加载中...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">✅ 用户已创建</div>
            <div style="color: #8fa3c2; margin-bottom: 20px;">临时密码为：</div>
            <div class="password-box" id="tempPassword"></div>
            <div style="margin-bottom: 20px; font-size: 13px; color: #8fa3c2;">
                请将此密码告知用户，<br>他们用此密码登录后可修改密码
            </div>
            <button class="copy-btn" onclick="copyPassword()">📋 复制密码</button>
            <button class="modal-btn" onclick="closePasswordModal()">完成</button>
        </div>
    </div>

    <script>
        async function loadUsers() {
            try {
                const res = await fetch('/api/users');
                const data = await res.json();
                if (data.success) {
                    renderUsers(data.users);
                    updateStats(data.users);
                }
            } catch (e) {
                showAlert('加载用户失败', 'error');
            }
        }

        async function createUser() {
            const username = document.getElementById('newUsername').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            const role = document.getElementById('newRole').value;

            if (!username || !email) {
                showAlert('请填写用户名和邮箱', 'error');
                return;
            }

            try {
                const res = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, role })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('newUsername').value = '';
                    document.getElementById('newEmail').value = '';
                    document.getElementById('newRole').value = 'user';
                    document.getElementById('tempPassword').textContent = data.tempPassword;
                    document.getElementById('passwordModal').classList.add('show');
                    loadUsers();
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (e) {
                showAlert('创建失败', 'error');
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersList');
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.username}</td>
                    <td><div class="user-email">${user.email}</div></td>
                    <td>
                        <select class="role-select" onchange="updateUserRole(${user.id}, this.value)">
                            <option value="user" ${user.role === 'user' ? 'selected' : ''}>User</option>
                            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                        </select>
                    </td>
                    <td>
                        <select class="status-select" onchange="updateUserStatus(${user.id}, this.value)">
                            <option value="active" ${user.status === 'active' ? 'selected' : ''}>启用</option>
                            <option value="disabled" ${user.status === 'disabled' ? 'selected' : ''}>禁用</option>
                        </select>
                    </td>
                    <td>
                        <button class="reset-btn" onclick="resetUserPassword(${user.id})">🔑 重置密码</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats(users) {
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('activeUsers').textContent = users.filter(u => u.status === 'active').length;
            document.getElementById('adminUsers').textContent = users.filter(u => u.role === 'admin').length;
        }

        async function updateUserRole(userId, role) {
            try {
                const res = await fetch(`/api/users/${userId}/role`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role })
                });
                const data = await res.json();
                if (data.success) {
                    showAlert('角色已更新', 'success');
                    loadUsers();
                }
            } catch (e) {
                showAlert('更新失败', 'error');
            }
        }

        async function updateUserStatus(userId, status) {
            try {
                const res = await fetch(`/api/users/${userId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                const data = await res.json();
                if (data.success) {
                    showAlert('状态已更新', 'success');
                    loadUsers();
                }
            } catch (e) {
                showAlert('更新失败', 'error');
            }
        }

        async function resetUserPassword(userId) {
            try {
                const res = await fetch(`/api/users/${userId}/reset-password`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('tempPassword').textContent = data.tempPassword;
                    document.getElementById('passwordModal').classList.add('show');
                    loadUsers();
                }
            } catch (e) {
                showAlert('重置失败', 'error');
            }
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').classList.remove('show');
        }

        function copyPassword() {
            const password = document.getElementById('tempPassword').textContent;
            navigator.clipboard.writeText(password).then(() => {
                showAlert('已复制到剪贴板', 'success');
            });
        }

        function showAlert(msg, type) {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.className = `alert ${type}`;
            alert.style.display = 'block';
            setTimeout(() => { alert.style.display = 'none'; }, 3000);
        }

        function logout() {
            fetch('/api/logout').then(() => {
                window.location.href = '/login';
            });
        }

        loadUsers();
    </script>
</body>
</html>
